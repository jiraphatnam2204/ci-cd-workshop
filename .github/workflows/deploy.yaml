name: Deploy ON Push

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Dependencies
        run: npm install
      - name: Run Build
        run: npm run build
      - name: Health Check
        run: echo "Health Check Passed"
      - name: Upload artifacts for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4